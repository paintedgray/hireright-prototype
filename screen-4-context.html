<!doctype html>
<html lang="en">
<head>

<title>SmartRecruiters · Candidate context — Candidate 12</title>
<style>
  :root {
    --bg: #f6f7f9;
    --surface: #ffffff;
    --surface-2: #fafbfc;
    --border: #e5e7eb;
    --border-strong: #d4d7dd;
    --ink: #0f172a;
    --ink-2: #334155;
    --ink-3: #64748b;
    --ink-4: #94a3b8;
    --brand: #0e6b6b;
    --brand-ink: #064e4e;
    --brand-soft: #e6f3f3;
    --warn: #b45309;
    --warn-bg: #fef6e7;
    --warn-border: #f3d795;
    --block: #b91c1c;
    --block-bg: #fdecec;
    --block-border: #f3b4b4;
    --ok: #047857;
    --ok-bg: #e6f4ee;
    --ok-border: #a7d4be;
    --tierA: #0e6b6b;
    --tierA-bg: #e6f3f3;
    --tierB: #475569;
    --tierB-bg: #eef2f7;
    --tierC: #b45309;
    --tierC-bg: #fef6e7;
    --shadow-sm: 0 1px 2px rgba(15,23,42,0.04);
    --shadow: 0 1px 3px rgba(15,23,42,0.06), 0 4px 16px rgba(15,23,42,0.04);
    --shadow-lg: -10px 0 40px rgba(15,23,42,0.10), -2px 0 8px rgba(15,23,42,0.05);
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif;
    color: var(--ink);
    background: var(--bg);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  button { font: inherit; color: inherit; cursor: pointer; }

  /* Layout: dimmed Screen 2 ghost on left, drawer panel on right */
  .stage {
    display: grid; grid-template-columns: 1fr 660px;
    height: 100vh; overflow: hidden;
  }

  /* Left: dimmed Screen 2 silhouette */
  .ghost {
    background: var(--bg);
    overflow: hidden; position: relative;
    opacity: 0.55; filter: saturate(0.7);
    pointer-events: none;
  }
  .ghost::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to right, transparent 60%, rgba(15,23,42,0.05) 100%);
  }
  .ghost-topbar {
    height: 56px; background: #0b2027;
    display: flex; align-items: center; padding: 0 20px; gap: 16px;
  }
  .ghost-topbar .dot { width: 22px; height: 22px; border-radius: 5px; background: linear-gradient(135deg, #14b8a6, #0e6b6b); }
  .ghost-topbar .line { width: 200px; height: 12px; background: #1e293b; border-radius: 3px; }
  .ghost-header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 18px 24px;
  }
  .ghost-header .title { width: 60%; height: 18px; background: #e2e8f0; border-radius: 4px; }
  .ghost-header .pills {
    margin-top: 16px; display: flex; gap: 6px;
  }
  .ghost-header .pill {
    width: 90px; height: 26px; background: #eef2f7; border-radius: 6px;
  }
  .ghost-header .pill.active { background: #cbd5e1; }
  .ghost-list { padding: 18px 20px; display: grid; gap: 6px; }
  .ghost-row {
    height: 60px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; display: flex; gap: 10px; align-items: center;
  }
  .ghost-row.selected {
    border-color: var(--brand); box-shadow: 0 0 0 2px rgba(14,107,107,0.15);
  }
  .ghost-row .num {
    width: 30px; height: 30px; border-radius: 7px; background: var(--surface-2);
    border: 1px solid var(--border); flex-shrink: 0;
  }
  .ghost-row .lines { flex: 1; display: grid; gap: 6px; }
  .ghost-row .lines .l1 { width: 50%; height: 12px; background: #e2e8f0; border-radius: 3px; }
  .ghost-row .lines .l2 { width: 75%; height: 10px; background: #eef2f7; border-radius: 3px; }
  .commit-rule { height: 0; border-top: 2px dashed var(--brand); opacity: 0.4; margin: 10px 4px; }

  /* Right: drawer panel */
  .drawer {
    background: var(--surface);
    box-shadow: var(--shadow-lg);
    display: flex; flex-direction: column;
    height: 100vh; overflow: hidden;
    animation: drawerIn .28s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes drawerIn {
    from { transform: translateX(20px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }

  /* Drawer header */
  .dhead {
    padding: 16px 22px 14px;
    border-bottom: 1px solid var(--border);
  }
  .dhead .row1 {
    display: flex; align-items: center; gap: 10px;
  }
  .dhead .name {
    font-size: 17px; font-weight: 600; letter-spacing: -0.01em;
  }
  .dhead .anon {
    color: var(--ink-3); font-weight: 500; font-size: 13px;
    display: inline-flex; align-items: center; gap: 4px;
    margin-left: 6px;
  }
  .dhead .reveal {
    margin-left: auto;
    background: transparent; border: 1px solid var(--border-strong);
    color: var(--ink-2); padding: 5px 10px; border-radius: 6px;
    font-size: 12px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .dhead .reveal:hover { background: var(--surface-2); }
  .dhead .reveal.on { background: var(--brand-soft); border-color: #bfe1e1; color: var(--brand-ink); }
  .dhead .close {
    background: transparent; border: 0;
    color: var(--ink-3); font-size: 18px; padding: 4px 8px;
    border-radius: 6px;
  }
  .dhead .close:hover { background: var(--surface-2); color: var(--ink); }
  .dhead .row2 {
    margin-top: 8px; display: flex; align-items: center; gap: 10px;
    font-size: 12.5px; color: var(--ink-3);
  }
  .tier-pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 2px 9px; border-radius: 999px;
    font-size: 11.5px; font-weight: 600;
    border: 1px solid;
  }
  .tier-pill.A { background: var(--tierA-bg); color: var(--tierA); border-color: #bfe1e1; }
  .tier-pill.B { background: var(--tierB-bg); color: var(--tierB); border-color: var(--border); }
  .tier-pill.C { background: var(--tierC-bg); color: var(--tierC); border-color: var(--warn-border); }
  .tier-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.7; }

  /* Drawer body — scrolls */
  .dbody {
    flex: 1; overflow-y: auto;
    padding: 18px 22px 24px;
  }

  /* Page-level orientation banner */
  .page-intro {
    padding: 12px 14px;
    background: var(--brand-soft);
    border: 1px solid #bfe1e1;
    border-radius: var(--radius);
    color: var(--brand-ink);
    font-size: 13px;
    line-height: 1.55;
    display: flex; align-items: flex-start; gap: 12px;
    margin-bottom: 18px;
  }
  .page-intro-icon {
    width: 22px; height: 22px; border-radius: 6px;
    background: var(--brand); color: #fff;
    display: grid; place-items: center;
    font-size: 11.5px; font-weight: 700;
    flex-shrink: 0; margin-top: 1px;
  }
  .page-intro-text { flex: 1; }
  .page-intro-text strong { color: var(--brand-ink); font-weight: 600; }
  .page-intro-text em { font-style: italic; color: var(--brand-ink); }

  /* Section */
  .section { margin-bottom: 22px; }
  .section-head {
    margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
  }
  .section-tag {
    font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--ink-4);
  }
  .section h3 { margin: 0; font-size: 14px; font-weight: 600; letter-spacing: -0.005em; }

  /* Section A — snapshot card */
  .snapshot {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius);
    display: grid; grid-template-columns: 1fr 1fr; gap: 0;
  }
  .snap-cell {
    padding: 12px 14px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .snap-cell:nth-child(2n) { border-right: none; }
  .snap-cell:nth-last-child(-n+2) { border-bottom: none; }
  .snap-cell .label {
    font-size: 11px; color: var(--ink-3);
    text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600;
    margin-bottom: 4px;
  }
  .snap-cell .value {
    font-size: 13.5px; font-weight: 500; color: var(--ink); line-height: 1.4;
  }
  .snap-cell .value .strong { color: var(--ok); font-weight: 600; }
  .snap-cell .value .quant-jump {
    color: var(--brand); text-decoration: none; font-weight: 500;
    font-size: 12px;
  }
  .snap-cell .value .quant-jump:hover { text-decoration: underline; }

  /* Section B — criteria match (gates + preferred sub-sections) */
  .sub-head {
    margin-top: 12px; margin-bottom: 6px;
    display: flex; align-items: baseline; gap: 8px;
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em;
    color: var(--ink-3);
  }
  .sub-head:first-child { margin-top: 0; }
  .sub-meta {
    font-weight: 500; text-transform: none; letter-spacing: 0; font-size: 11px; color: var(--ink-4);
  }
  .weight-badge {
    display: inline-block; margin-left: 6px;
    padding: 1px 7px; border-radius: 999px;
    background: var(--surface-2); border: 1px solid var(--border);
    font-size: 11px; font-weight: 500; color: var(--ink-3);
    font-variant-numeric: tabular-nums;
    vertical-align: middle;
  }
  .must {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
  }
  .must-row {
    display: grid; grid-template-columns: 28px 1fr auto;
    gap: 12px; padding: 14px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background .12s ease;
  }
  .must-row:last-child { border-bottom: none; }
  .must-row:hover { background: var(--surface-2); }
  .must-row .check {
    width: 22px; height: 22px; border-radius: 6px;
    display: grid; place-items: center;
    font-size: 11px; font-weight: 700;
    flex-shrink: 0; margin-top: 1px;
  }
  .must-row.ok .check { background: var(--ok); color: white; }
  .must-row.miss .check { background: var(--warn-bg); color: var(--warn); border: 1px solid var(--warn-border); }
  .must-row .body .name {
    font-weight: 500; font-size: 13.5px; color: var(--ink);
  }
  .must-row .body .name .badge-pref {
    color: var(--ink-3); font-size: 11px; font-weight: 500;
    margin-left: 6px;
    padding: 1px 7px; border-radius: 999px;
    background: var(--surface-2); border: 1px solid var(--border);
  }
  .must-row .body .evidence {
    margin-top: 4px; font-size: 12.5px; color: var(--ink-3); line-height: 1.5;
    font-style: italic;
  }
  .must-row .body .evidence strong { font-style: normal; color: var(--ink-2); }
  .must-row .body .none {
    margin-top: 4px; font-size: 12.5px; color: var(--warn); line-height: 1.5;
  }
  .must-row .jump {
    color: var(--ink-4); font-size: 12px; align-self: center;
    transition: color .15s ease, transform .15s ease;
  }
  .must-row:hover .jump { color: var(--brand); transform: translateX(2px); }

  /* Section C — resume excerpt */
  .resume {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
  }
  .resume .job-head {
    margin-bottom: 8px;
  }
  .resume .job-head .title { font-weight: 600; font-size: 13.5px; }
  .resume .job-head .meta { font-size: 12px; color: var(--ink-3); margin-top: 2px; }
  .resume + .resume { margin-top: 10px; }
  .resume ul { list-style: none; padding: 0; margin: 0; }
  .resume li {
    padding: 7px 10px 7px 22px;
    position: relative;
    font-size: 13px; color: var(--ink-2); line-height: 1.55;
    border-radius: 6px;
  }
  .resume li::before {
    content: '•'; position: absolute; left: 8px; top: 6px;
    color: var(--ink-4);
  }
  .resume li.match {
    background: var(--ok-bg); border-left: 3px solid var(--ok); padding-left: 19px;
    color: var(--ink);
    cursor: pointer;
    transition: background .12s ease;
  }
  .resume li.match::before { color: var(--ok); }
  .resume li.match:hover { background: #d1ebe0; }
  .resume li.match.flash {
    animation: matchFlash 1.2s ease;
  }
  @keyframes matchFlash {
    0% { background: #b8e2cc; }
    100% { background: var(--ok-bg); }
  }
  .resume li .quant {
    display: inline-block; margin-right: 4px;
    color: var(--brand);
  }
  .match-tag {
    display: inline-block; margin-left: 8px;
    font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--ok); background: white;
    padding: 1px 6px; border-radius: 999px;
    border: 1px solid var(--ok-border);
    vertical-align: middle;
  }

  /* Section D — sticky override actions */
  .dactions {
    border-top: 1px solid var(--border);
    background: var(--surface);
    padding: 12px 22px;
    display: flex; gap: 8px; align-items: center; justify-content: flex-end;
  }
  .dactions button {
    border: 1px solid var(--border-strong); background: var(--surface);
    color: var(--ink); padding: 8px 14px; border-radius: 8px;
    font-weight: 500; font-size: 13px; box-shadow: var(--shadow-sm);
    transition: all .12s ease;
  }
  .dactions .promote {
    background: var(--brand); border-color: var(--brand); color: white;
  }
  .dactions .promote:hover { background: var(--brand-ink); border-color: var(--brand-ink); }
  .dactions .demote:hover { background: var(--warn-bg); border-color: var(--warn-border); color: var(--warn); }
  .dactions .dismiss:hover { background: var(--block-bg); border-color: var(--block-border); color: var(--block); }

  /* Responsive: collapse the ghost on smaller screens */
  @media (max-width: 1024px) {
    .stage { grid-template-columns: 1fr; }
    .ghost { display: none; }
    .drawer { box-shadow: none; }
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #0f172a; color: #fff; padding: 10px 16px; border-radius: 8px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2); font-size: 13px;
    opacity: 0; pointer-events: none; transition: opacity .2s ease, transform .2s ease;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
</style>
</head>

  // -------- Render functions --------
  function renderSnapshot(c) {
    return `
      <div class="section">
        <div class="section-head"><span class="section-tag">Section A</span><h3>Snapshot</h3></div>
        <div class="snapshot">
          <div class="snap-cell"><div class="label">Relevant experience</div>
            <div class="value"><strong>${c.snapshot.years}</strong> years</div></div>
          <div class="snap-cell"><div class="label">Most recent role</div>
            <div class="value">${c.snapshot.mostRecent}</div></div>
          <div class="snap-cell"><div class="label">Domain match</div>
            <div class="value"><span class="strong">${c.snapshot.domain.strength}</span> — ${c.snapshot.domain.detail}</div></div>
          <div class="snap-cell"><div class="label">Quantified achievements</div>
            <div class="value"><strong>${c.snapshot.quantCount} found</strong> · <a class="quant-jump" href="#" data-jump="quant">jump to resume ↓</a></div></div>
        </div>
      </div>
    `;
  }
  function renderMustHaveRow(m) {
    if (m.status === 'ok') {
      const jump = m.anchor ? `data-jump="${m.anchor}"` : '';
      const weight = m.type === 'preferred' ? ` <span class="weight-badge">w${m.weight}</span>` : '';
      return `
        <div class="must-row ok" ${jump}>
          <div class="check">✓</div>
          <div class="body">
            <div class="name">${m.name}${weight}</div>
            <div class="evidence">${m.evidence}</div>
          </div>
          <div class="jump">↓</div>
        </div>`;
    }
    // miss
    const weight = m.type === 'preferred' ? ` <span class="weight-badge">w${m.weight}</span>` : '';
    return `
      <div class="must-row miss">
        <div class="check">!</div>
        <div class="body">
          <div class="name">${m.name}${weight}</div>
          <div class="none">${m.none}</div>
        </div>
        <div class="jump"></div>
      </div>`;
  }
  function renderMustHaves(c) {
    const gates     = c.mustHaves.filter(m => m.type === 'gate');
    const preferred = c.mustHaves.filter(m => m.type === 'preferred');
    const gatesHtml = gates.length
      ? `
        <div class="sub-head">Gates <span class="sub-meta">must pass · pass / fail</span></div>
        <div class="must">${gates.map(renderMustHaveRow).join('')}</div>`
      : '';
    const prefMissing = preferred.filter(m => m.status !== 'ok').length;
    const prefHtml = preferred.length
      ? `
        <div class="sub-head">Preferred <span class="sub-meta">weighted · ${preferred.length - prefMissing} of ${preferred.length} matched</span></div>
        <div class="must">${preferred.map(renderMustHaveRow).join('')}</div>`
      : '';
    return `
      <div class="section">
        <div class="section-head"><span class="section-tag">Section B</span><h3>Criteria match</h3></div>
        ${gatesHtml}
        ${prefHtml}
      </div>
    `;
  }
  function renderResume(c) {
    const jobs = c.resume.map(job => {
      const bullets = job.bullets.map(b => {
        const cls = b.match ? `match` : '';
        const anchor = b.match ? `data-anchor="${b.match}"` : '';
        const quant = b.quant ? '<span class="quant">📊</span> ' : '';
        const tag = b.tag ? ` <span class="match-tag">${b.tag}</span>` : '';
        return `<li class="${cls}" ${anchor}>${quant}${b.text}${tag}</li>`;
      }).join('');
      return `
        <div class="resume">
          <div class="job-head">
            <div class="title">${job.title}</div>
            <div class="meta">${job.meta}</div>
          </div>
          <ul>${bullets}</ul>
        </div>`;
    }).join('');
    return `
      <div class="section">
        <div class="section-head"><span class="section-tag">Section C</span><h3>Resume excerpt</h3></div>
        ${jobs}
      </div>
    `;
  }

  function renderBanner() {
    return `
      <div class="page-intro">
        <div class="page-intro-icon">ⓘ</div>
        <div class="page-intro-text">
          Evidence-based context for one candidate — <em>no scores, just what the resume says</em>. Click ✓ criteria rows to jump to matching resume bullets. Use the actions at the bottom to override the model on this candidate.
        </div>
      </div>
    `;
  }
  function renderBody(c) {
    document.getElementById('dbody').innerHTML =
      renderBanner() + renderSnapshot(c) + renderMustHaves(c) + renderResume(c);
  }

  function renderActions(c) {
    // Promote only available for below-the-line candidates (rank > 10).
    // Demote only available for top-10 candidates.
    // Dismiss always available.
    const inTopTen = c.rank <= 10;
    const buttons = inTopTen
      ? `<button class="demote" data-action="demote">↓ Demote</button>
         <button class="dismiss" data-action="dismiss">✕ Dismiss</button>`
      : `<button class="dismiss" data-action="dismiss">✕ Dismiss</button>
         <button class="promote" data-action="promote">↑ Promote to top 10</button>`;
    document.getElementById('dactions').innerHTML = buttons;
    // Wire handlers
    document.querySelectorAll('#dactions button').forEach(b => {
      b.addEventListener('click', () => handleOverrideAction(c, b.dataset.action));
    });
  }

  function init() {
    const c = CAND[candidateId];
    document.getElementById('candIdLabel').textContent = candidateId;

    if (!c) {
      // Fallback for candidates without rich data
      document.getElementById('rankLabel').textContent = fromRank;
      document.getElementById('dbody').innerHTML = `
        <div style="padding:18px 20px; background: var(--surface-2); border:1px dashed var(--border-strong); border-radius: 10px; color: var(--ink-3); font-size: 13px; line-height: 1.55;">
          <strong style="color: var(--ink-2);">Demo profiles available for Candidates 7, 23, 41 (Tier A) and 12 (below the line).</strong>
          Other candidates would be parsed identically; this view shows the template.
        </div>
      `;
      return;
    }

    document.getElementById('rankLabel').textContent = c.rank;
    const tierPill = document.getElementById('tierPill');
    tierPill.className = `tier-pill ${c.tierClass}`;
    tierPill.innerHTML = `<span class="dot"></span>${c.tier} · #${c.rank}`;

    renderBody(c);
    renderActions(c);
  }
  init();

  // -------- Reveal name toggle --------
  let revealed = false;
  document.getElementById('revealBtn').addEventListener('click', () => {
    revealed = !revealed;
    const c = CAND[candidateId];
    const label = document.getElementById('candName');
    const anon = document.getElementById('anonTag');
    const btn = document.getElementById('revealBtn');
    if (revealed && c?.revealName) {
      label.innerHTML = `${c.revealName} <span class="anon" style="font-weight:400;color:var(--ink-3); font-size:13px;">· #${candidateId}</span>`;
      anon.style.display = 'none';
      btn.classList.add('on');
      btn.innerHTML = '🔒 Anonymize';
    } else {
      label.innerHTML = `Candidate <span id="candIdLabel">${candidateId}</span>`;
      anon.style.display = '';
      btn.classList.remove('on');
      btn.innerHTML = '👁 Reveal name';
    }
  });

  // -------- Jump-to-evidence --------
  function jumpTo(anchor) {
    const target = document.querySelector(`.resume li[data-anchor="${anchor}"]`);
    if (!target) return;
    target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    target.classList.remove('flash');
    void target.offsetWidth; // restart animation
    target.classList.add('flash');
  }
  document.querySelectorAll('[data-jump]').forEach(el => {
    el.addEventListener('click', e => {
      const anchor = el.dataset.jump;
      if (anchor === 'quant') {
        // jump to first quantified bullet
        const target = document.querySelector('.resume li .quant')?.closest('li');
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'center' });
          target.classList.remove('flash'); void target.offsetWidth; target.classList.add('flash');
        }
        e.preventDefault();
        return;
      }
      jumpTo(anchor);
    });
  });

  // -------- Override action handler (wired in renderActions) → navigate to Screen 3 --------
  // Promote → lands at end of Tier A, narrative 'top 10'.
  // Demote → lands at #11 (first below-the-line slot).
  // Dismiss → removed.
  function handleOverrideAction(c, action) {
    const from = c.rank;
    let to;
    if (action === 'promote')      to = 'top 10';
    else if (action === 'demote')  to = 11;
    else if (action === 'dismiss') to = 'removed';
    const url = `screen-3-override.html?candidate=${candidateId}&action=${action}&from=${from}&to=${encodeURIComponent(to)}`;
    window.location.href = url;
  }

  // -------- Close → back to Screen 2 --------
  function closeDrawer() { window.location.href = 'screen-2-ranked.html'; }
  document.getElementById('closeBtn').addEventListener('click', closeDrawer);
  document.querySelector('.ghost').addEventListener('click', closeDrawer);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

  // -------- Toast helper (for future use) --------
  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }
</script>
</body>
</html>
